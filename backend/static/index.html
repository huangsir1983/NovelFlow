  `;
  container.appendChild(panel);

  const opLabels = { rewrite:'改写', expand:'扩写', condense:'缩写', dialogue_optimize:'对话优化',
    visualize:'视觉化', tone_shift:'换语气', continue_3way:'续写三方向', scene_detail:'补充场景',
    subtext:'补充潜台词', dialogue_rhythm:'对白节奏' };
  let streaming = false;
  panel.querySelectorAll('[data-op]').forEach(btn => {
    btn.onclick = async () => {
      if (streaming) return;
      const text = panel.querySelector('#ai-text').value.trim();
      if (!text) { toast('请先输入文本', 'error'); return; }
      if (!state.project) { toast('请先打开项目', 'error'); return; }

      streaming = true;
      const resultEl = panel.querySelector('#ai-result');
      resultEl.className = 'ai-result ai-streaming';
      resultEl.textContent = '';
      const origText = btn.textContent;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const body = { text, operation: btn.dataset.op };
        if (btn.dataset.op === 'tone_shift') {
          const tone = prompt('目标语气（如：紧张/悬疑、温暖/治愈、冷峻/克制、幽默/讽刺、史诗/庄严）', '紧张/悬疑');
          if (!tone) { streaming = false; btn.disabled = false; btn.textContent = origText; return; }
          body.tone = tone;
        }
        await apiStream(
          `/api/projects/${state.project.id}/ai/operate`, body,
          (chunk) => {
            if (chunk.type === 'text') resultEl.textContent += chunk.content;
            else if (chunk.type === 'error') { toast(chunk.message, 'error'); }
            else if (chunk.type === 'done') { resultEl.className = 'ai-result'; }
          }
        );
      } catch(e) { toast(e.message, 'error'); }
      streaming = false;
      resultEl.className = 'ai-result';
      btn.disabled = false;
      btn.textContent = origText;
    };
  });
}

// ═══ SETTINGS PAGE ════════════════════════════
function renderSettings(app) {
  renderHeader(app);
  const body = document.createElement('div');
  body.className = 'app-body';
  app.appendChild(body);

  const page = document.createElement('div');
  page.className = 'settings-page animate-fade';
  page.innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <div>
        <button class="btn btn-secondary btn-sm" onclick="navigate('/')" style="margin-right:12px">← 返回</button>
        <span style="font-size:20px;font-weight:600">设置</span>
      </div>
      <button class="btn btn-primary btn-sm" id="add-provider-btn">+ 添加供应商</button>
    </div>
    <div id="providers-list"><div class="text-center p-4"><span class="spinner"></span> 加载中...</div></div>
  `;
  body.appendChild(page);

  page.querySelector('#add-provider-btn').onclick = () => openProviderForm(null);
  loadProviders();
}

async function loadProviders() {
  const el = document.getElementById('providers-list');
  if (!el) return;
  try {
    const data = await api('/api/settings/ai-providers');
    state.providers = data.providers || [];
    renderProvidersList();
  } catch(e) {
    el.innerHTML = `<div class="error-box">${esc(e.message)}</div>`;
  }
}

function renderProvidersList() {
  const el = document.getElementById('providers-list');
  if (!el) return;
  if (state.providers.length === 0) {
    el.innerHTML = '<div class="card text-center p-6" style="color:var(--text-muted)">尚未配置 AI 供应商<br><span class="text-xs">点击上方 "添加供应商" 开始配置</span></div>';
    return;
  }
  el.innerHTML = state.providers.map(p => `
    <div class="provider-card" data-id="${p.id}">
      <div class="provider-header">
        <div class="provider-name">
          ${esc(p.name)}
          ${p.is_default ? '<span class="badge badge-gold">默认</span>' : ''}
          ${p.enabled ? '<span class="badge badge-green">已启用</span>' : '<span class="badge badge-red">已禁用</span>'}
        </div>
        <div class="flex gap-2">
          <button class="btn btn-secondary btn-sm test-btn" data-id="${p.id}">测试连接</button>
          <button class="btn btn-secondary btn-sm edit-btn" data-id="${p.id}">编辑</button>
          <button class="btn btn-danger btn-sm del-btn" data-id="${p.id}">删除</button>
        </div>
      </div>
      <div class="provider-info">
        <div><dt>类型</dt><dd>${p.provider_type}</dd></div>
        <div><dt>API Key</dt><dd>${p.api_key_masked || '****'}</dd></div>
        <div><dt>优先级</dt><dd>${p.priority}</dd></div>
        <div><dt>模型数</dt><dd>${(p.models||[]).length}</dd></div>
      </div>
      <div class="model-list">
        ${(p.models||[]).map(m => `
          <div class="model-tag">
            <span>${esc(m.display_name || m.model_id)}</span>
            <span class="badge ${m.capability_tier==='fast'?'badge-green':m.capability_tier==='advanced'?'badge-gold':'badge-brand'}">${m.capability_tier}</span>
            <span class="badge badge-blue">${m.model_type || 'text'}</span>
          </div>
        `).join('')}
      </div>
      <div class="test-result" id="test-result-${p.id}" style="font-size:12px;margin-top:4px"></div>
    </div>
  `).join('');

  // Bind events
  el.querySelectorAll('.test-btn').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      const resEl = document.getElementById(`test-result-${id}`);
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
      try {
        const res = await api(`/api/settings/ai-providers/${id}/test`, { method: 'POST' });
        resEl.innerHTML = res.success
          ? `<span style="color:var(--success)">✓ ${esc(res.message)}</span>`
          : `<span style="color:var(--error)">✗ ${esc(res.message)}</span>`;
      } catch(e) {
        resEl.innerHTML = `<span style="color:var(--error)">✗ ${esc(e.message)}</span>`;
      }
      btn.disabled = false; btn.textContent = '测试连接';
    };
  });
  el.querySelectorAll('.edit-btn').forEach(btn => {
    btn.onclick = () => {
      const p = state.providers.find(p => p.id === btn.dataset.id);
      if (p) openProviderForm(p);
    };
  });
  el.querySelectorAll('.del-btn').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('确定删除此供应商？')) return;
      try {
        await api(`/api/settings/ai-providers/${btn.dataset.id}`, { method: 'DELETE' });
        toast('已删除', 'success');
        loadProviders();
      } catch(e) { toast(e.message, 'error'); }
    };
  });
}

// ─── Provider Form Modal ──────────────────────
function openProviderForm(provider) {
  const isEdit = !!provider;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const types = ['anthropic','gemini','openai_compat','responses_api','grok_video','nanobanana'];
  const formState = {
    type: provider?.provider_type || 'anthropic',
    name: provider?.name || '',
    baseUrl: provider?.base_url || '',
    apiKey: '',
    models: provider?.models?.length ? provider.models.map(m => ({...m})) : [{ model_id: '', display_name: '', model_type: 'text', capability_tier: 'standard', max_tokens: 4096, supports_streaming: true }],
    priority: provider?.priority ?? 10,
    isDefault: provider?.is_default || false,
    enabled: provider?.enabled ?? true,
  };

  function renderForm() {
    const modal = overlay.querySelector('.modal');
    if (!modal) return;
    modal.innerHTML = `
      <div class="modal-header">
        <h3>${isEdit ? '编辑供应商' : '添加供应商'}</h3>
        <button class="icon-btn" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      <div class="form-group">
        <label>供应商类型</label>
        <div class="type-selector">
          ${types.map(t => `<button class="type-btn ${formState.type===t?'active':''}" data-type="${t}">${t}</button>`).join('')}
        </div>
      </div>
      <div class="form-group">
        <label>名称</label>
        <input class="input" id="pf-name" value="${esc(formState.name)}" placeholder="供应商名称">
      </div>
      <div class="form-group">
        <label>Base URL</label>
        <input class="input" id="pf-url" value="${esc(formState.baseUrl)}" placeholder="API 基础 URL">
      </div>
      <div class="form-group">
        <label>API Key ${isEdit ? '(留空则不更新)' : ''}</label>
        <input class="input" id="pf-key" type="password" value="" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label>模型列表</label>
        <div id="pf-models"></div>
        <button class="btn btn-secondary btn-sm mt-2" id="pf-add-model">+ 添加模型</button>
      </div>
      <div class="form-row gap-4">
        <div class="form-group" style="flex:1">
          <label>优先级 (数字越小越优先)</label>
          <input class="input" id="pf-priority" type="number" value="${formState.priority}">
        </div>
        <div class="form-group" style="flex:1">
          <label class="checkbox" style="margin-top:24px">
            <input type="checkbox" id="pf-default" ${formState.isDefault?'checked':''}>
            设为默认
          </label>
        </div>
      </div>
      <div class="flex justify-between mt-4">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
        <button class="btn btn-primary" id="pf-save">保存</button>
      </div>
    `;

    // Type buttons
    modal.querySelectorAll('.type-btn').forEach(btn => {
      btn.onclick = () => { formState.type = btn.dataset.type; renderForm(); };
    });

    // Bind inputs
    modal.querySelector('#pf-name').oninput = (e) => formState.name = e.target.value;
    modal.querySelector('#pf-url').oninput = (e) => formState.baseUrl = e.target.value;
    modal.querySelector('#pf-priority').oninput = (e) => formState.priority = parseInt(e.target.value) || 10;
    modal.querySelector('#pf-default').onchange = (e) => formState.isDefault = e.target.checked;

    // Models
    const modelsEl = modal.querySelector('#pf-models');
    formState.models.forEach((m, i) => {
      const row = document.createElement('div');
      row.className = 'model-row';
      row.innerHTML = `
        <input class="input" placeholder="Model ID" value="${esc(m.model_id)}" data-i="${i}" data-f="model_id" style="flex:2">
        <input class="input" placeholder="显示名" value="${esc(m.display_name)}" data-i="${i}" data-f="display_name" style="flex:2">
        <select class="input" data-i="${i}" data-f="capability_tier" style="flex:1">
          <option value="fast" ${m.capability_tier==='fast'?'selected':''}>Fast</option>
          <option value="standard" ${m.capability_tier==='standard'?'selected':''}>Standard</option>
          <option value="advanced" ${m.capability_tier==='advanced'?'selected':''}>Advanced</option>
        </select>
        <select class="input" data-i="${i}" data-f="model_type" style="flex:1">
          <option value="text" ${(m.model_type||'text')==='text'?'selected':''}>Text</option>
          <option value="image" ${m.model_type==='image'?'selected':''}>Image</option>
          <option value="video" ${m.model_type==='video'?'selected':''}>Video</option>
        </select>
        ${formState.models.length > 1 ? `<button class="btn btn-danger btn-sm" data-rm="${i}">✕</button>` : ''}
      `;
      modelsEl.appendChild(row);
    });

    modelsEl.querySelectorAll('input[data-f],select[data-f]').forEach(inp => {
      inp.oninput = () => { formState.models[inp.dataset.i][inp.dataset.f] = inp.value; };
      inp.onchange = () => { formState.models[inp.dataset.i][inp.dataset.f] = inp.value; };
    });
    modelsEl.querySelectorAll('[data-rm]').forEach(btn => {
      btn.onclick = () => { formState.models.splice(parseInt(btn.dataset.rm), 1); renderForm(); };
    });

    modal.querySelector('#pf-add-model').onclick = () => {
      formState.models.push({ model_id: '', display_name: '', model_type: 'text', capability_tier: 'standard', max_tokens: 4096, supports_streaming: true });
      renderForm();
    };

    // Save
    modal.querySelector('#pf-save').onclick = async () => {
      const saveBtn = modal.querySelector('#pf-save');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="spinner"></span>';

      const apiKeyVal = modal.querySelector('#pf-key').value;
      const payload = {
        name: formState.name,
        provider_type: formState.type,
        base_url: formState.baseUrl,
        models: formState.models,
        is_default: formState.isDefault,
        enabled: formState.enabled,
        priority: formState.priority,
      };
      if (apiKeyVal || !isEdit) payload.api_key = apiKeyVal;

      try {
        if (isEdit) {
          await api(`/api/settings/ai-providers/${provider.id}`, { method: 'PUT', body: JSON.stringify(payload) });
        } else {
          await api('/api/settings/ai-providers', { method: 'POST', body: JSON.stringify(payload) });
        }
        toast(isEdit ? '供应商已更新' : '供应商已添加', 'success');
        overlay.remove();
        loadProviders();
      } catch(e) {
        toast(e.message, 'error');
        saveBtn.disabled = false;
        saveBtn.textContent = '保存';
      }
    };
  }

  const modalEl = document.createElement('div');
  modalEl.className = 'modal';
  overlay.appendChild(modalEl);
  document.body.appendChild(overlay);
  renderForm();
}

// ═══ UTILS ════════════════════════════════════
function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// ═══ INIT ═════════════════════════════════════
render();
</script>
</body>
</html>
